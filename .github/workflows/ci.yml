name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "crates/*/src/**"
      - "crates/*/Cargo.toml"
      - "crates/*/build.rs"
      - "Cargo.lock"
      - ".cargo/config.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "crates/*/src/**"
      - "crates/*/Cargo.toml"
      - "crates/*/build.rs"
      - "Cargo.lock"
      - ".cargo/config.toml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

env:
  RUST_BACKTRACE: full
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run typos
        uses: crate-ci/typos@v1

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Format
        run: |
          rustup toolchain install nightly --profile minimal --component rustfmt
          cargo +nightly fmt -- --check

  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build
        run: |
          cargo build --locked --all-features --workspace
      - name: Lint (clippy)
        run: |
          cargo clippy --all-features --workspace -- -D warnings
      - name: Test
        run: |
          cargo test --all-features --workspace -- --include-ignored

  coverage:
    name: Coverage
    needs: [build]
    runs-on: ${{ matrix.os }}
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Coverage
        run: |
          cargo +nightly llvm-cov --all-features --workspace \
            --codecov --output-path codecov.json \
            -- --include-ignored
      - name: Upload to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: codecov.json
          use_pypi: true
          fail_ci_if_error: true
